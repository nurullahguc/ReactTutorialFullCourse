<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ProductDetails({ productName, productPrice, discountPrice }) {
            //const { productName, productPrice } = props;
            return (
                <>
                    <p>{productName}</p>
                    <p>Price: ${productPrice}</p>
                    {discountPrice && (
                        <p>Discount Price : ${discountPrice}</p>
                    )}
                    <button>Add to Cart</button>
                </>
            );
        }

        function App() {
            return (
                <>
                    <ProductDetails
                        productName="Cotton socks"
                        productPrice="10.90"
                        discountPrice="5.45"
                    />
                    <ProductDetails
                        productName="Tennis balls"
                        productPrice="6.00"
                    />
                    <ProductDetails
                        productName="Plain T-Shirt"
                        productPrice="7.99"
                    />

                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
