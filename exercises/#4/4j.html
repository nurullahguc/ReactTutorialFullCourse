<!DOCTYPE html>
<html>

<head>
    <title>Chatbot</title>

    <style>
        body {
            font-family: Arial;
            margin-top: 0;
            margin-bottom: 0;
        }

        .app-container {
            max-width: 600px;
            height: 100vh;
            margin-left: auto;
            margin-right: auto;

            display: flex;
            flex-direction: column;
        }

        .chat-messages-container {
            flex-grow: 1;
            margin-top: 20px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .chat-messages-container::-webkit-scrollbar {
            display: none;
        }

        .chat-message-user {
            display: flex;
            justify-content: end;
            align-items: start;
        }

        .chat-message-robot {
            display: flex;
            justify-content: start;
            align-items: start;
        }

        .chat-message-text {
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 20px;
            max-width: 300px;
            word-wrap: break-word;
        }

        .chat-message-profile {
            width: 45px;
        }

        .chat-input-container {
            display: flex;
            margin-bottom: 60px;
        }

        .chat-input {
            padding: 12px 15px;
            border: 1px solid rgb(180, 180, 180);
            border-radius: 10px;
            font-size: 15px;
            flex-grow: 1;
        }

        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .send-button:disabled {
            background-color: rgb(150, 190, 170);
            cursor: not-allowed;
        }
        .welcome-text{
            color: gray;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

        function ChatInput({
            chatMessages,
            setChatMessages,
            isLoading,
            setIsLoading
        }) {
            const [inputText, setInputText] = React.useState('');

            function saveInputText(event) {
                setInputText(event.target.value);
            }

            async function sendMessage() {
                if (inputText.trim() === '' || isLoading) {
                    return;
                }

                const messageText = inputText;

                const newChatMessages = [
                    ...chatMessages,
                    {
                        message: messageText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }
                ];

                setChatMessages(newChatMessages);
                setInputText('');
                setIsLoading(true);

                try {
                    const response =
                        await Chatbot.getResponseAsync(messageText);

                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ]);
                } catch (error) {
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: 'Sorry, something went wrong.',
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ]);
                } finally {
                    setIsLoading(false);
                }
            }

            function handleKeyDown(event) {
                if (event.key === 'Enter') {
                    sendMessage();
                }

                if (event.key === 'Escape') {
                    setInputText('');
                }
            }

            return (
                <div className="chat-input-container">
                    <input
                        className="chat-input"
                        placeholder="Send a message to Chatbot"
                        onChange={saveInputText}
                        onKeyDown={handleKeyDown}
                        value={inputText}
                    />

                    <button
                        className="send-button"
                        onClick={sendMessage}
                        disabled={isLoading || inputText.trim() === ''}
                    >
                        {isLoading ? 'Sending...' : 'Send'}
                    </button>
                </div>
            );
        }

        function ChatMessage({ message, sender }) {
            return (
                <div
                    className={
                        sender === 'user'
                            ? 'chat-message-user'
                            : 'chat-message-robot'
                    }
                >
                    {sender === 'robot' && (
                        <img
                            className="chat-message-profile"
                            src="../../robot.png"
                        />
                    )}

                    <div className="chat-message-text">
                        {message}
                    </div>

                    {sender === 'user' && (
                        <img
                            className="chat-message-profile"
                            src="../../user.png"
                        />
                    )}
                </div>
            );
        }

        function ChatMessages({ chatMessages, isLoading }) {
            const chatMessagesRef = React.useRef(null);

            React.useEffect(() => {
                const containerElement = chatMessagesRef.current;

                if (containerElement) {
                    containerElement.scrollTop =
                        containerElement.scrollHeight;
                }
            }, [chatMessages, isLoading]);

            return (
                <div
                    ref={chatMessagesRef}
                    className="chat-messages-container"
                >
                    {chatMessages.map((chatMessage) => (
                        <ChatMessage
                            message={chatMessage.message}
                            sender={chatMessage.sender}
                            key={chatMessage.id}
                        />
                    ))}

                    {isLoading && (
                        <ChatMessage
                            message="Loading..."
                            sender="robot"
                        />
                    )}
                </div>
            );
        }

        function App() {
            const [chatMessages, setChatMessages] = React.useState([]);

            const [isLoading, setIsLoading] = React.useState(false);

            return (
                <div className="app-container">

                    {
                        chatMessages.length === 0
                            ? (
                                <p className="welcome-text">Welcome to the chatbot project! Send a message using the textbox below!</p>
                            )
                            : ''
                    }

                    <ChatMessages
                        chatMessages={chatMessages}
                        isLoading={isLoading}
                    />

                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                        isLoading={isLoading}
                        setIsLoading={setIsLoading}
                    />
                </div>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);

    </script>
</body>

</html>
