<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ProductDetails({ productName, productPrice, discountPrice, productImage }) {
            //const { productName, productPrice } = props;
            return (
                <>
                    <div>
                        <img src={productImage} width="70" />
                    </div>
                    <p>{productName}</p>

                    {discountPrice ? (
                        <p><del>Price: ${productPrice}</del></p>
                    ) : (
                        <p>Price: ${productPrice}</p>
                    )}

                    {discountPrice && (
                        <p>Discount Price : ${discountPrice}</p>
                    )}
                    <button>Add to Cart</button>
                    <br/>
                    <br/>
                </>
            );
        }

        function App() {
            return (
                <>
                    <ProductDetails
                        productName="Cotton socks"
                        productPrice="10.90"
                        discountPrice="5.45"
                        productImage="https://supersimple.dev/images/cotton-socks.png"
                    />
                    <ProductDetails
                        productName="Tennis balls"
                        productPrice="6.00"
                        productImage="https://supersimple.dev/images/tennis-balls.png"
                    />
                    <ProductDetails
                        productName="Plain T-Shirt"
                        productPrice="7.99"
                        productImage="https://supersimple.dev/images/plain-t-shirt.png"
                    />

                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
